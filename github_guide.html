<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHubアカウント作成</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    background: #f6f8fa;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    width: 640px;
    padding: 44px 48px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .logo svg { width: 36px; height: 36px; }
  .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: #24292f;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #24292f;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 2px solid #eaeef2;
  }
  .steps { display: flex; flex-direction: column; gap: 20px; }
  .step {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .num {
    background: #0969da;
    color: white;
    font-weight: 700;
    font-size: 15px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-body { flex: 1; }
  .step-title {
    font-size: 16px;
    font-weight: 700;
    color: #24292f;
    margin-bottom: 4px;
  }
  .step-desc {
    font-size: 14px;
    color: #57606a;
    line-height: 1.6;
  }
  .url-box {
    display: inline-block;
    background: #f6f8fa;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 14px;
    font-weight: 600;
    color: #0969da;
    margin-top: 6px;
    letter-spacing: 0.01em;
  }
  .note {
    background: #fff8c5;
    border-left: 3px solid #d4a72c;
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 13px;
    color: #57606a;
    margin-top: 8px;
    line-height: 1.6;
  }
  .footer {
    margin-top: 28px;
    padding-top: 16px;
    border-top: 1px solid #eaeef2;
    font-size: 13px;
    color: #8c959f;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 16 16" fill="#24292f">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
    <span class="logo-text">GitHub</span>
  </div>

  <h1>アカウント作成ガイド</h1>

  <div class="steps">
    <div class="step">
      <div class="num">1</div>
      <div class="step-body">
        <div class="step-title">サイトを開く</div>
        <div class="step-desc">以下をクリックしてサイトを開く</div>
        <a class="url-box" href="https://github.com" target="_blank">https://github.com</a>
      </div>
    </div>

    <div class="step">
      <div class="num">2</div>
      <div class="step-body">
        <div class="step-title">右上の「サインアップ」をクリック</div>
      </div>
    </div>

    <div class="step">
      <div class="num">3</div>
      <div class="step-body">
        <div class="step-title">「Continue with Google」をクリック</div>
        <div class="step-desc">使いたい Gmail アカウントを選ぶだけで登録完了</div>
      </div>
    </div>

    <div class="step">
      <div class="num">4</div>
      <div class="step-body">
        <div class="step-title">ユーザー名を決める</div>
        <div class="step-desc">
          GitHub上の名前を英数字で自由に決める
        </div>
        <div class="note">⚠️ ユーザー名はURLに使われるので、後から変更しにくい</div>
      </div>
    </div>

    <div class="step">
      <div class="num">5</div>
      <div class="step-body">
        <div class="step-title">完了！ユーザー名を教えてもらう</div>
        <div class="step-desc">
          作成したユーザー名を教えてもらえればアクセス権を付与します
        </div>
      </div>
    </div>
  </div>

  <div class="footer">無料プランで OK ／ クレジットカード不要</div>
</div>
</body>
</html>
